<!-- ── Sidebar Component ──────────────────────────────────────
     Include via: loadComponent('sidebar', '#app-sidebar-slot')
     Requires: layout.js (handles toggle, collapse, mobile)
─────────────────────────────────────────────────────────── -->

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <a class="sidebar-brand" href="/dashboard">
            <div class="brand-mark">KN</div>
            <span class="brand-name">KNE Vape</span>
        </a>
        <button class="sidebar-toggle" id="desktopToggle" onclick="toggleSidebar()" title="Collapse sidebar">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-label">Main</div>
            <a href="/dashboard" class="nav-item" data-page="dashboard" data-tooltip="Dashboard">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="/inventory" class="nav-item" data-page="inventory" data-tooltip="Inventory">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span class="nav-text">Inventory</span>
            </a>
            <a href="/sales" class="nav-item" data-page="sales" data-tooltip="Sales">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="nav-text">Sales</span>
            </a>
            <a href="/reports" class="nav-item" data-page="reports" data-tooltip="Reports">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="nav-text">Reports</span>
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <button class="nav-item" data-tooltip="Sign Out" onclick="logout()" style="color: var(--red);">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span class="nav-text">Sign Out</span>
        </button>
    </div>
</aside>

<script>
    (function() {
        if (localStorage.getItem('kne_sidebar') === 'collapsed') {
            document.getElementById('sidebar').classList.add('collapsed');
            var btn = document.getElementById('desktopToggle');
            if (btn) btn.style.transform = 'rotate(180deg)';
        }
    })();
</script>
