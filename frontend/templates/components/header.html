<!-- ── Nav / Header Component ─────────────────────────────────
     Include via: loadComponent('nav', '#app-nav-slot')
     Requires: layout.js (handles theme toggle, user chip)
     Customize: set data-title attribute on the slot element,
                or call setNavTitle('My Page') after load.
─────────────────────────────────────────────────────────── -->

<header class="app-header">
    <!-- Mobile hamburger -->
    <button class="btn-icon" id="mobileMenuBtn" onclick="openMobileSidebar()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <span class="header-title" id="navTitle">KNE Vape Shop</span>

    <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
        </button>
        <div class="user-chip" id="userChip">
            <div class="user-avatar" id="userAvatar">?</div>
            <span id="userName">Loading...</span>
        </div>
    </div>
</header>
