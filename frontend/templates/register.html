<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNE Vape Shop | Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-mark">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
        </div>
        <h1>KNE Vape Shop</h1>
        <p>Inventory Management System</p>
    </div>

    <div class="auth-card">
        <h2>Create account</h2>
        <p class="subtitle">Register to manage KNE inventory</p>

        <div id="msgBox" class="alert"></div>

        <div class="field">
            <label>Full Name</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z"/>
                </svg>
                <input type="text" id="name" placeholder="Juan Dela Cruz" required>
            </div>
        </div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="field">
            <label>Confirm Password</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="confirm_password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="field">
            <label>Account Role</label>
            <div class="role-row">
                <select id="role" onchange="toggleAdminPasscode()">
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>

        <div class="field" id="adminCodeDiv" style="display: none;">
            <label>Admin Passcode</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
                <input type="password" id="admin_passcode" placeholder="Enter admin passcode">
            </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleRegister()" style="margin-top:8px;">
            Create Account
        </button>
    </div>

    <p class="auth-footer">
        Already have an account? <a href="/">Sign in</a>
    </p>
</div>

<script>
    (function() {
        const t = localStorage.getItem('kne_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    })();
</script>
<script src="/static/js/auth.js"></script>
</body>
</html>
