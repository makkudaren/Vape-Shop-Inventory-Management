<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KNE Vape Shop</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    .placeholder-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .placeholder-wrap h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.4px; }
    .placeholder-wrap p  { color: var(--text-2); font-size: 15px; }
    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
    }
    .role-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--surface-2);
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .logout-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 14px;
      transition: all 0.18s;
    }
    .logout-btn:hover { background: var(--surface-2); color: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>
<div class="placeholder-wrap">
  <h1>Dashboard</h1>
  <p>Phase 1 & 2 complete. Authentication is working.</p>

  <div class="user-pill">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span id="userName">Loading...</span>
    <span class="role-badge" id="userRole">—</span>
  </div>

  <button class="logout-btn" onclick="handleLogout()">Sign out</button>
</div>

<script src="/static/js/auth.js"></script>
<script>
  requireAuth();
  const user = getUser();
  if (user) {
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role;
  }
  function handleLogout() {
    clearSession();
    window.location.href = '/login';
  }
</script>
</body>
</html>
