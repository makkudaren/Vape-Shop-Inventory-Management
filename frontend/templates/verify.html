<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNE Vape Shop | Verify Email</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-mark">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1>KNE Vape Shop</h1>
        <p>Inventory Management System</p>
    </div>

    <div class="auth-card">
        <h2>Check your email</h2>
        <p class="subtitle">Enter the 6-digit code sent to your inbox</p>

        <div id="msgBox" class="alert"></div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="field">
            <label>Verification Code</label>
            <input type="text" id="code" placeholder="000000" maxlength="6" required class="code-input">
        </div>

        <button class="btn btn-primary btn-full" onclick="handleVerify()" style="margin-top:8px;">
            Verify Account
        </button>
    </div>

    <p class="auth-footer">
        <a href="/">← Back to Sign In</a>
    </p>
</div>

<script>
    (function() {
        const t = localStorage.getItem('kne_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    })();

    document.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem("verify_email");
        if (savedEmail) document.getElementById("email").value = savedEmail;
    });
</script>
<script src="/static/js/auth.js"></script>
</body>
</html>
