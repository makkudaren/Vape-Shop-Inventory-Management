<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KNE Vape Shop</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<div class="auth-layout">

  <!-- Brand panel (left) -->
  <div class="auth-brand">
    <div class="brand-logo">KNE Vape Shop</div>
    <div class="brand-tagline">
      <h1>Inventory,<br>under control.</h1>
      <p>Manage stock, track sales, and monitor your store — all in one place.</p>
    </div>
  </div>

  <!-- Auth panel (right) -->
  <div class="auth-panel">
    <button class="theme-toggle" id="themeToggle" onclick="theme.toggle()" aria-label="Toggle theme"></button>

    <div class="auth-panel-header">
      <h2>Welcome back</h2>
      <p>Sign in to your account to continue.</p>
    </div>

    <div class="alert" id="alert" role="alert"></div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input class="form-control" type="email" id="email"
             placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input class="form-control" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password">
        <button class="input-toggle" id="pwToggle"
                onclick="togglePassword('password','pwToggle')" type="button" aria-label="Show password">
          <!-- eye icon injected by JS -->
        </button>
      </div>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
      <div class="spinner"></div>
      <span class="btn-label">Sign in</span>
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>

</div>

<script src="/static/js/auth.js"></script>
<script>
  redirectIfAuth();

  // inject eye icon on load
  document.getElementById('pwToggle').innerHTML = iconEye();

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    hideAlert('alert');

    if (!email || !password) {
      return showAlert('alert', 'Please fill in all fields.');
    }

    setLoading('loginBtn', true);
    try {
      const data = await apiPost('/api/auth/login', { email, password });
      saveSession(data);
      window.location.href = '/dashboard';
    } catch (err) {
      showAlert('alert', err.message);
    } finally {
      setLoading('loginBtn', false);
    }
  }
</script>
</body>
</html>
