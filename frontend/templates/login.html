<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KNE Vape Shop | Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-mark">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
        </div>
        <h1>KNE Vape Shop</h1>
        <p>Inventory Management System</p>
    </div>

    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to access your inventory</p>

        <div id="msgBox" class="alert"></div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-icon-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-icon-wrap has-toggle">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                
                <input type="password" id="loginPassword" placeholder="Enter your password">
                
                <button type="button" class="toggle-password-btn" onclick="togglePassword('loginPassword', this)" title="Show Password">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleLogin()" style="margin-top:8px;">
            Sign In
        </button>
    </div>

    <p class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
    </p>
</div>

<script>
    // Theme persistence
    (function() {
        const t = localStorage.getItem('kne_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    })();

    document.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem("verify_email");
        if (savedEmail) document.getElementById("email").value = savedEmail;
    });
</script>
<script src="/static/js/auth.js"></script>
</body>
</html>
